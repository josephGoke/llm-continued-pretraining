model:
  name: LiquidAI/LFM2.5-8B-A1B-Base
  tokenizer_name: LiquidAI/LFM2.5-8B-A1B-Base
  max_seq_length: 12000

data:
  train_path: ./data/data.jsonl
  validation_path: ./data/val.jsonl
  field_name: text
  validation_split: 0.1
  streaming: False  # Set to true to stream datasets from HF Hub
  num_workers: 4
  corpus: ./folder
  streaming: True
  train_path: Crtop/packed-quant-math-mixture

training:
  output_dir: ./outputs/checkpoint
  num_epochs: 3
  learning_rate: 0.00005
  batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 10
  max_steps: -1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  seed: 42
  gradient_checkpointing: true
  mixed_precision: bf16  # Set to 'fp16' if using NVIDIA GPUs without native bfloat16 support

evaluation:
  eval_interval: 500
  eval_dataset_size: 1000
  save_best_model: true
  metric_for_best_model: loss
  greater_is_better: false

checkpointing:
  save_interval: 1000
  save_total_limit: 3
  resume_from_checkpoint: null
  overwrite_output_dir: false

distributed:
  use_fsdp: true
  fsdp_config:
    sharding_strategy: FULL_SHARD
    cpu_offload: false
    backward_prefetch: BACKWARD_PRE
    state_dict_type: SHARDED
    limit_all_gathers: true

logging:
  logging_interval: 10
  logging_dir: ./outputs/logs
  use_wandb: True  # Set to true to enable Weights & Biases monitoring (requires: wandb login)
  wandb_project: llm-continued-pretraining
  wandb_entity: adegokejoseph6-personal  # Replace with your W&B username
  log_model: True  # Set to true to log model checkpoints to W&B

model_upload:
  push_to_hub: false
  hub_model_id: null
  hub_private: true
  commit_message: "Continued pretraining checkpoint"


